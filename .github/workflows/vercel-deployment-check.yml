name: Preflight

# Real production gate. When Vercel finishes building a deployment it fires a
# `repository_dispatch` event at this repo; this workflow runs the Preflight
# scan, which posts a GitHub check run named `preflight`. Vercel Deployment
# Checks auto-discovers that check run by name and, when it's required for the
# Production environment, holds (or allows) the promotion based on its result.
# The status@v1 step below also reports a commit status as a secondary signal.
#
# repository_dispatch only fires from workflows on the DEFAULT branch, so this
# gate is inert until merged to main. Vercel-side setup (require the `preflight`
# check in Deployment Checks, enable the GitHub integration's dispatch events,
# add PREFLIGHT_API_KEY) is documented on the /install page.
on:
  repository_dispatch:
    types:
      - vercel.deployment.success

jobs:
  security-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      statuses: write # status@v1 sets the commit status Vercel gates on
      checks: write # the Preflight action posts the detailed "preflight" check run
    steps:
      # Secondary signal: sets a commit status to pending now (on the
      # deployment's ref from the dispatch payload) and reports this job's
      # final success/failure at cleanup. The gate Vercel actually requires is
      # the `preflight` check run posted by the action below, not this status.
      - name: Report status to Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: preflight

      # No explicit ref: scans the current default-branch source, which is the
      # commit Vercel just built for production. Mirrors Vercel's documented
      # repository_dispatch example and avoids blocking promotion on a bad ref.
      - uses: actions/checkout@v4

      # commit-sha pins the check run to the exact deployed commit from the
      # dispatch payload (falls back to GITHUB_SHA when the field is absent).
      - uses: theartofthepossible2/preflight/action@v1
        with:
          api-key: ${{ secrets.PREFLIGHT_API_KEY }}
          commit-sha: ${{ github.event.client_payload.git.sha }}
