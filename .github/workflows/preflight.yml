name: Preflight
on:
  pull_request:
  workflow_dispatch:

# PR-time security gate: posts the "preflight" check against the PR head so
# branch protection can block merges on HIGH findings. Production promotion is
# gated separately by vercel-deployment-check.yml, which Vercel triggers via
# repository_dispatch — Vercel does NOT read these check runs directly. The gate
# logic lives in action/report.mjs.
jobs:
  security-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./action
        with:
          api-key: ${{ secrets.PREFLIGHT_API_KEY }}
