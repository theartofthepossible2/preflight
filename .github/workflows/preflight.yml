name: Preflight
on:
  pull_request:
  workflow_dispatch:

# Dogfood run: posts the "preflight" check on this repo. It is NOT wired into
# Vercel Deployment Checks, so a red check here does not block any deploy.
jobs:
  security-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./action
        with:
          api-key: ${{ secrets.PREFLIGHT_API_KEY }}
