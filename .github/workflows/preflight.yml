name: Preflight
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Dogfood run on this repo. On pushes to main it posts the "preflight" check
# against the production commit, so Vercel Deployment Checks can hold the
# production promotion on HIGH findings (once enabled in Vercel settings). On
# PRs it posts against the PR head. The gate logic lives in action/report.mjs.
jobs:
  security-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./action
        with:
          api-key: ${{ secrets.PREFLIGHT_API_KEY }}
